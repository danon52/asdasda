<div class="grid gap-10 grid-cols-4">

  <p>Сейчас: {{date() | date: 'dd.MM.yy'}} </p>

  <p>У вас на балансе: {{1470 | currency: 'INR' : 'symbol-narrow'}} </p>

  <!-- <p>{{ users() | json }}</p> -->

  @for (user of users(); track user.id) {

  <div>
    <p>{{user.id}}</p>
    <p> {{user.name | reverse}} </p>
    <p> {{user.email}} </p>
    <p> {{user.address.city | uppercase}} </p>
  </div>

  }





</div>
